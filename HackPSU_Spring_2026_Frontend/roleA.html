<!DOCTYPE html>
<html>
<head>
    <title>Role A</title>
</head>
<body>
    <h1>Role A</h1>

    <h2 id="directiveText">Waiting for directive...</h2>

    <h3 id="roomCode"></h3>

    <label>Value:</label>
    <input type="range" id="slider" min="1" max="100" value="50">
    <span id="sliderValue">50</span>

    <br><br>

    <label>Hydraulics:</label>
    <select id="hydraulics">
        <option>ON</option>
        <option>OFF</option>
    </select>

    <br><br>

    <button onclick="sendResponse()">Submit</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="socket.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get("room");
        const role = params.get("role");

        const slider = document.getElementById("slider");
        const sliderValue = document.getElementById("sliderValue");

        document.getElementById("roomCode").textContent = `Room Code: ${room}`;

        slider.oninput = () => {
            sliderValue.textContent = slider.value;
        };

        socket.on("directive_update", ({ directive }) => {
            document.getElementById("directiveText").textContent =
                `${directive.type.toUpperCase()}: ${directive.value}`;
        });

        function sendResponse() {
            const type = document.getElementById("directiveText").textContent
                .split(":")[0]
                .toLowerCase();

            let value;

            if (type === "hydraulics") {
                value = document.getElementById("hydraulics").value;
            } else {
                value = parseInt(slider.value);
            }

            socket.emit("player_response", {
                room,
                role,
                type,
                value
            });
        }
    </script>
</body>
</html>
